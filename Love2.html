<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>love heart 2 — made in razeerh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff2d95;
            --pink-glow: rgba(255, 45, 149, 0.8);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .heart-container {
            position: relative;
            width: min(80vmin, 600px);
            height: min(80vmin, 600px);
        }

        .ily {
            position: absolute;
            color: var(--pink);
            font-size: clamp(10px, 2vmin, 16px);
            white-space: nowrap;
            text-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink-glow);
            opacity: 0;
            animation: pulse 3s infinite;
            user-select: none;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .credit {
            position: fixed;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>
    <div class="credit">Made in razeerh</div>

    <script>
        (function() {
            const container = document.getElementById('heart');
            const density = 60;

            function getPoint(t) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                return { x, y };
            }

            function render() {
                container.innerHTML = '';
                const { clientWidth: w, clientHeight: h } = container;
                const scale = w / 40;

                for (let i = 0; i < density; i++) {
                    const t = (i / density) * 2 * Math.PI;
                    const pos = getPoint(t);
                    
                    const el = document.createElement('span');
                    el.className = 'ily';
                    el.textContent = 'I love you';
                    
                    el.style.left = `${(w / 2) + pos.x * scale}px`;
                    el.style.top = `${(h * 0.45) + pos.y * scale}px`;
                    el.style.animationDelay = `${Math.random() * 3}s`;

                    container.appendChild(el);
                }
            }

            render();

            let timer;
            window.addEventListener('resize', () => {
                clearTimeout(timer);
                timer = setTimeout(render, 200);
            });
        })();
    </script>
</body>
</html>
